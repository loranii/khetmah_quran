<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الصفحة غير موجودة</title>

    <style>
        body{
            font-family: sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
            text-align:center;
            width:min(90%,500px);
        }

        h1{
            color:#c0392b;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#3498db;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>404</h1>

    <p>
        الصفحة التي تبحث عنها غير موجودة
    </p>

    <a href="/">
        العودة للرئيسية
    </a>
</div>

</body>
</html>
